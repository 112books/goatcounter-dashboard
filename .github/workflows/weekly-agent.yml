name: Weekly Marketing Agent

on:
  schedule:
    - cron: '0 7 * * 1'   # dilluns 08:00 CET (UTC+1 hivern) = 07:00 UTC
  workflow_dispatch:
    inputs:
      site:
        description: 'Site to run (all, pocallum, llumatics)'
        required: false
        default: 'all'

jobs:
  intelligence:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - site: pocallum
            config: config/pocallum.cat.yaml
            gc_token_secret: GOATCOUNTER_TOKEN
          - site: llumatics
            config: config/llumatics.com.yaml
            gc_token_secret: GOATCOUNTER_TOKEN_LLUMATICS

    steps:
      - name: Skip if not selected
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.site != 'all' && github.event.inputs.site != matrix.site }}
        run: |
          echo "Saltant ${{ matrix.site }} (no seleccionat)"
          exit 0

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-agent.txt

      - name: Set ISO week
        run: echo "ISO_WEEK=$(date -u +%Y-%W)" >> $GITHUB_ENV

      - name: Run intelligence agent — ${{ matrix.site }}
        env:
          GOATCOUNTER_TOKEN:  ${{ secrets[matrix.gc_token_secret] }}
          GSC_CLIENT_ID:      ${{ secrets.GSC_CLIENT_ID }}
          GSC_CLIENT_SECRET:  ${{ secrets.GSC_CLIENT_SECRET }}
          GSC_REFRESH_TOKEN:  ${{ secrets.GSC_REFRESH_TOKEN }}
          GH_TOKEN:           ${{ secrets.GH_AGENT_TOKEN }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          AGENT_CONFIG:       ${{ matrix.config }}
        run: python scripts/run-weekly-agent.py

      - name: Commit insights + snapshot — ${{ matrix.site }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add admin/snapshots/ admin/insights/ || true
          git diff --staged --quiet || git commit -m "chore: weekly insights ${{ matrix.site }} [skip ci]"
          git pull --rebase
          git push
